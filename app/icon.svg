<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <!-- Fondo de la carta con borde redondeado -->
  <rect x="2" y="2" width="60" height="60" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="4"/>

  <!-- Número 1 en la esquina superior izquierda -->
  <text x="10" y="22" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="900" fill="#1e293b">1</text>
  
  <!-- ESPADA -->
  <!-- Hoja de la espada (Mitad izquierda más clara) -->
  <path d="M32 10 L39 42 L25 42 Z" fill="#3b82f6"/>
  
  <!-- Bisel/Sombra de la hoja (Mitad derecha más oscura) -->
  <path d="M32 10 L39 42 L32 42 Z" fill="#1d4ed8"/>
  
  <!-- Guarda / Gavilán (Curva característica de la baraja española) -->
  <path d="M18 40 Q32 48 46 40" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Empuñadura -->
  <rect x="29" y="42" width="6" height="10" fill="#78350f"/>
  
  <!-- Pomo -->
  <circle cx="32" cy="54" r="4" fill="#f59e0b"/>
</svg>
